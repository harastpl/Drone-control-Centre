// --- MAP INITIALIZER ---
function initializeMap() {
    console.log('Initializing map...');
    
    const statusBox = document.getElementById('gps-status-box');
    const mapStatusId = 'mapStatus';
    const connectBtn = document.getElementById('mapConnectBtn');
    const activateBtn = document.getElementById('activateGpsBtn');
    const portSelect = document.getElementById('port');
    const baudSelect = document.getElementById('baud');

    // FIX: Properly initialize Leaflet map
    const mapContainer = document.getElementById('map');
    if (mapContainer) {
        // Always create a new map instance
        console.log('Creating new map instance');
        
        // Make sure container is empty
        mapContainer.innerHTML = '';
        
        // Create new map
        mapInstance = L.map('map').setView([22.719568, 75.857727], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(mapInstance);
        
        mapPolyline = L.polyline([], {color: 'red'}).addTo(mapInstance);
        
        // Force map to invalidate size after a short delay
        setTimeout(() => {
            if (mapInstance) {
                mapInstance.invalidateSize();
                console.log('Map resized after initialization');
            }
        }, 300);
    }

    // Function to update map with GPS data
    const updateMapDashboard = (data) => {
        if (data) {
            console.log('Map data:', data);
            
            if (data.valid) {
                if (statusBox) {
                    statusBox.innerHTML = '<i class="fas fa-satellite-dish"></i> GPS Active';
                    statusBox.classList.add('active');
                }
                
                if (data.lat && data.lon) {
                    const latLng = [data.lat, data.lon];
                    if (!mapMarker) {
                        mapMarker = L.marker(latLng).addTo(mapInstance).bindPopup("Current Position").openPopup();
                    } else {
                        mapMarker.setLatLng(latLng);
                    }
                    mapPolyline.addLatLng(latLng);
                    mapInstance.setView(latLng);
                }
            }

            // Update GPS data displays
            ['lat', 'lon', 'speed', 'alt', 'sats', 'hdop', 'vdop'].forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    let value = '--';
                    if (key === 'lat' && data.lat !== undefined) value = parseFloat(data.lat).toFixed(6);
                    else if (key === 'lon' && data.lon !== undefined) value = parseFloat(data.lon).toFixed(6);
                    else if (key === 'speed' && data.speed !== undefined) value = parseFloat(data.speed).toFixed(1);
                    else if (key === 'alt' && data.altitude !== undefined) value = data.altitude;
                    else if (key === 'sats' && data.satellites !== undefined) value = data.satellites;
                    else if (key === 'hdop' && data.hdop !== undefined) value = parseFloat(data.hdop).toFixed(2);
                    else if (key === 'vdop' && data.vdop !== undefined) value = parseFloat(data.vdop).toFixed(2);
                    
                    el.textContent = value;
                }
            });
            
            if (data.last_update) {
                const timeEl = document.getElementById('time');
                if (timeEl) timeEl.textContent = data.last_update;
            }
        }
    };

    // Poll for map data (GPS parsing)
    const pollMapData = async () => {
        try {
            const res = await fetch('/api/map/data');
            const data = await res.json();
            updateMapDashboard(data);
        } catch (e) { 
            console.error('Map poll error', e); 
        }
    };

    // Start polling for map data
    if (mapUpdatePoll) clearInterval(mapUpdatePoll);
    mapUpdatePoll = setInterval(pollMapData, 1000);
    pollMapData();

    // Set up button handlers
    if (connectBtn) {
        connectBtn.onclick = async () => {
            if (isConnected) {
                await disconnectSerial(mapStatusId);
            } else {
                const port = portSelect ? portSelect.value : currentPort;
                const baud = baudSelect ? baudSelect.value : currentBaud;
                if (port) {
                    await connectSerial(port, baud, mapStatusId);
                } else {
                    showAlert('error', 'Connection Error', 'Please select a COM port first');
                }
            }
        };
    }
    
    if (activateBtn) {
        activateBtn.onclick = async () => {
            console.log('Activating GPS...');
            
            if (!isConnected) {
                showAlert('error', 'Not Connected', 'Please connect to serial port first');
                return;
            }
            
            // Use the command pattern for GPS command 'i'
            await sendCommandWithPattern('i', mapStatusId);
            
            const statusEl = document.getElementById(mapStatusId);
            if (statusEl) {
                showStatus(statusEl, 'GPS activated', 'success');
            }
        };
    }
    
    // Add callback to process serial data for GPS
    const processGPSData = (data) => {
        if (data.includes('$GPGGA') || data.includes('$GPRMC')) {
            console.log('GPS sentence received:', data.substring(0, 50));
        }
    };
    
    addDataCallback(processGPSData);
    
    // Update connection status
    if (isConnected) {
        updateConnectionStatus(mapStatusId, `Connected to ${currentPort}`);
    } else {
        updateConnectionStatus(mapStatusId, 'Disconnected');
    }
    
    console.log('Map initialization complete');
}

// --- PROGRAM UPLOADER INITIALIZER ---
function initializeProgramUploader() {
    console.log('Initializing program uploader...');
    
    const portSelect = document.getElementById('port');
    const refreshPortsBtn = document.getElementById('refreshPorts');
    const baudSelect = document.getElementById('baud');
    const fileTypeSelect = document.getElementById('fileType');
    const firmwareFile = document.getElementById('firmwareFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const serialLog = document.getElementById('serialLog');
    const connectBtn = document.getElementById('connectBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sendMessage = document.getElementById('sendMessage');
    const lineEndingSelect = document.getElementById('lineEnding');
    const sendBtn = document.getElementById('sendBtn');
    const sendNewlineBtn = document.getElementById('sendNewlineBtn');

    const addToLog = (text) => {
        if (serialLog) {
            serialLog.textContent += text;
            serialLog.scrollTop = serialLog.scrollHeight;
        }
    };
    
    // Refresh available COM ports
    const refreshPorts = async () => {
        const statusElement = document.getElementById('serialStatus');
        try {
            console.log('Refreshing ports...');
            const response = await fetch('/api/ports');
            const ports = await response.json();
            console.log('Available ports:', ports);
            
            if (portSelect) {
                portSelect.innerHTML = '<option value="">Select port...</option>';
                ports.forEach(port => {
                    const option = document.createElement('option');
                    option.value = port;
                    option.textContent = port;
                    portSelect.appendChild(option);
                });
                
                // Select current port if connected
                if (currentPort && ports.includes(currentPort)) {
                    portSelect.value = currentPort;
                }
            }
        } catch (error) {
            console.error('Error refreshing ports:', error);
            showStatus(statusElement, `Error refreshing ports: ${error.message}`, 'error');
        }
    };

    // Upload firmware
    const uploadFirmware = async () => {
        const statusElement = document.getElementById('uploadStatus');
        const progressBar = document.getElementById('progressBar');
        
        if (!portSelect || !portSelect.value) { 
            showAlert('error', 'Upload Error', 'Please select a COM port first');
            return; 
        }
        if (!firmwareFile || !firmwareFile.files[0]) { 
            showAlert('error', 'Upload Error', 'Please select a firmware file');
            return; 
        }

        const formData = new FormData();
        formData.append('file', firmwareFile.files[0]);
        formData.append('port', portSelect.value);
        formData.append('file_type', fileTypeSelect.value);
        formData.append('baud_rate', baudSelect.value);

        uploadBtn.disabled = true;
        if (progressBar) progressBar.style.width = '50%';
        const uploadToastId = showToast('info', 'Uploading', 'Firmware upload in progress...', 0);
        try {
            const response = await fetch('/api/upload', { method: 'POST', body: formData });
            const result = await response.json();

            removeToast(uploadToastId);
            
            if (result.success) {
                if (progressBar) progressBar.style.width = '100%';
                if (result.notification) {
                    showToast(result.notification.type, result.notification.title, result.notification.message, result.notification.duration || 2000);
                }
                setTimeout(() => {
                    if (progressBar) progressBar.style.width = '0%';
                }, 2000);
            } else {
                if (progressBar) progressBar.style.width = '0%';
                if (result.notification) {
                    showAlert(result.notification.type, 
                        result.notification.title, 
                        result.notification.message,
                        'Upload failed',
                        result.message || '');
                }
            }
        } catch (error) {
            removeToast(uploadToastId);
            if (progressBar) progressBar.style.width = '0%';

            showAlert('error', 'Upload Error', 
                'Firmware upload failed',
                'Network or server error',
                error.toString()
            );
        } finally {
            uploadBtn.disabled = false;
        }
    };

    // Toggle connection
    const toggleConnection = async () => {
        const statusElementId = 'serialStatus';
        if (isConnected) {
            await disconnectSerial(statusElementId);
        } else {
            if (!portSelect || !portSelect.value) {
                showAlert('error', 'Connection Error', 'Please select a COM port first');
                return;
            }
            await connectSerial(portSelect.value, baudSelect.value, statusElementId);
        }
    };
    
    // Clear log
    const clearLog = () => {
         if (serialLog) serialLog.textContent = '';
    };

    // Send message - using normal send for manual text input
    const sendMsg = async (newline = false) => {
        const statusElementId = 'serialStatus';
        let lineEnding = lineEndingSelect ? lineEndingSelect.value : 'lf';
        if (newline) lineEnding = 'lf';
        
        if (!sendMessage || !sendMessage.value.trim()) {
            showAlert('warning', 'Empty Message', 'Please enter a message to send');
            return;
        }
        
        const success = await sendSerial(sendMessage.value, lineEnding, statusElementId);
        
        if (success) {
            let logEntry = `> ${sendMessage.value}`;
            if (lineEnding === 'lf') logEntry += '\\n';
            else if (lineEnding === 'cr') logEntry += '\\r';
            else if (lineEnding === 'crlf') logEntry += '\\r\\n';
            else if (lineEnding === 'hex') logEntry = `> ${sendMessage.value} (HEX)`;
            
            addToLog(logEntry + '\n');
            sendMessage.value = '';
        }
    };
    
    // Set up button handlers
    if (refreshPortsBtn) refreshPortsBtn.onclick = refreshPorts;
    if (uploadBtn) uploadBtn.onclick = uploadFirmware;
    if (connectBtn) connectBtn.onclick = toggleConnection;
    if (clearBtn) clearBtn.onclick = clearLog;
    if (sendBtn) sendBtn.onclick = () => sendMsg(false);
    if (sendNewlineBtn) sendNewlineBtn.onclick = () => sendMsg(true);
    if (sendMessage) {
        sendMessage.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMsg(false);
            }
        });
    }
    
    // Add callback to log all serial data
    addDataCallback(addToLog);
    
    // Initial refresh and status update
    refreshPorts();
    if (isConnected) {
        updateConnectionStatus('serialStatus', `Connected to ${currentPort}`);
    } else {
        updateConnectionStatus('serialStatus', 'Disconnected');
    }
    
    console.log('Program uploader initialization complete');
}

// --- DASHBOARD INITIALIZATION ---
function initializeDashboard() {
    console.log('Initializing dashboard...');
    
    const dashboardLog = document.getElementById('dashboardLog');
    const dashboardStatusId = 'dashboardStatus';
    const dashboardConnectBtn = document.getElementById('dashboardConnectBtn');
    const dashboardClearBtn = document.getElementById('dashboardClearBtn');
    const portSelect = document.getElementById('port');
    const baudSelect = document.getElementById('baud');
    
    // Utility function for delays
    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    
    const addToDashboardLog = (text) => {
        if (dashboardLog) {
            dashboardLog.textContent += text;
            dashboardLog.scrollTop = dashboardLog.scrollHeight;
        }
    };

    // Data parsing functions
    const parseRCPulseData = (line) => {
        console.log('=== PARSING RC PULSE DATA ===');
        console.log('Raw line:', line);
        
        const patterns = {
            start: /Start:(\d+)/,
            roll: /Roll:\s*(\S+)/,
            pitch: /Pitch:\s*(\S+)/,
            throttle: /Throttle:\s*(\S+)/,
            yaw: /Yaw:\s*(\S+)/,
            ch5: /CH5:\s*(\S+)/,
            ch6: /CH6:\s*(\S+)/
        };
        
        Object.entries(patterns).forEach(([key, pattern]) => {
            const match = line.match(pattern);
            if (match) {
                const value = match[1];
                console.log(`${key}: "${value}"`);
                
                if (key === 'start') {
                    const armStatus = parseInt(value);
                    const armElement = document.getElementById('armStatus');
                    if (armElement) {
                        armElement.textContent = armStatus === 0 ? 'ARMED' : 'DISARMED';
                        armElement.className = armStatus === 0 ? 'data-value armed' : 'data-value disarmed';
                        console.log(`Arm status: ${armStatus === 0 ? 'ARMED' : 'DISARMED'}`);
                    }
                } else {
                    const prefixMap = {
                        'roll': 'roll',
                        'pitch': 'pitch', 
                        'throttle': 'throttle',
                        'yaw': 'yaw',
                        'ch5': 'ch5',
                        'ch6': 'ch6'
                    };
                    
                    if (prefixMap[key]) {
                        updateSlider(prefixMap[key], value);
                    }
                }
            } else {
                console.log(`No match for ${key}`);
            }
        });
        
        console.log('=== END RC PARSING ===\n');
    };

    const parseIMUData = (line) => {
        const pitchMatch = line.match(/Pitch:\s*([-\d.]+)/);
        const rollMatch = line.match(/Roll:\s*([-\d.]+)/);
        const yawMatch = line.match(/Yaw:\s*([-\d.]+)/);
        const tempMatch = line.match(/Temp:\s*([-\d.]+)/);
        
        if (pitchMatch) updateElement('pitchAngle', pitchMatch[1] + '°');
        if (rollMatch) updateElement('rollAngle', rollMatch[1] + '°');
        if (yawMatch) updateElement('yawAngle', yawMatch[1] + '°');
        if (tempMatch) updateElement('imuTemp', tempMatch[1] + '°C');
    };

    const parseGyroData = (line) => {
        const xMatch = line.match(/Gyro_x\s*=\s*([-\d]+)/);
        const yMatch = line.match(/Gyro_y\s*=\s*([-\d]+)/);
        const zMatch = line.match(/Gyro_z\s*=\s*([-\d]+)/);
        
        if (xMatch) updateElement('gyroX', xMatch[1]);
        if (yMatch) updateElement('gyroY', yMatch[1]);
        if (zMatch) updateElement('gyroZ', zMatch[1]);
    };

    const parseAccelData = (line) => {
        const xMatch = line.match(/ACC_x\s*=\s*([-\d]+)/);
        const yMatch = line.match(/ACC_y\s*=\s*([-\d]+)/);
        const zMatch = line.match(/ACC_z\s*=\s*([-\d]+)/);
        
        if (xMatch) updateElement('accelX', xMatch[1]);
        if (yMatch) updateElement('accelY', yMatch[1]);
        if (zMatch) updateElement('accelZ', zMatch[1]);
    };

    const parseBatteryData = (line) => {
        const voltageMatch = line.match(/Voltage\s*=\s*([\d.]+)V/);
        if (voltageMatch) {
            updateElement('batteryVoltage', voltageMatch[1] + 'V');
        }
    };
    
    const parsePIDReadback = (line) => {
        const match = line.match(/PID:([\w_]+)=([-\d.]+)/);
        if (match) {
            const varName = match[1];
            const value = match[2];
            const inputElement = document.querySelector(`input[data-pid-var="${varName}"]`);
            if (inputElement) {
                inputElement.value = value;
                addToDashboardLog(`[PID Read] ${varName} = ${value}\n`);
            }
        }
    };

    const processDashboardData = (data) => {
        console.log('Dashboard data received:', data.substring(0, 200));
        
        const lines = data.split('\n');
        lines.forEach(line => {
            line = line.trim();
            if (!line) return;
            
            if (line.includes('Start:')) {
                console.log('=== RC PULSE LINE ===');
                console.log('Parsing:', line);
                parseRCPulseData(line);
            }
            else if (line.includes('Pitch:') && line.includes('Roll:') && line.includes('Yaw:')) {
                parseIMUData(line);
            }
            else if (line.includes('Gyro_x =') || line.includes('Gyro_y =') || line.includes('Gyro_z =')) {
                parseGyroData(line);
            }
            else if (line.includes('ACC_x =') || line.includes('ACC_y =') || line.includes('ACC_z =')) {
                parseAccelData(line);
            }
            else if (line.includes('Voltage =')) {
                parseBatteryData(line);
            }
            else if (line.startsWith('PID:')) {
                parsePIDReadback(line);
            }

            addToDashboardLog(line + '\n');
        });
    };
    
    // Unified command sending function for ALL commands
    const sendDashboardCommand = async (command) => {
        console.log(`Dashboard: Sending command: ${command}`);
        
        if (!isConnected) {
            showToast('error', 'Not Connected', 'Connect to serial port first');
            addToDashboardLog(`[ERROR] Not connected - cannot send: ${command}\n`);
            return false;
        }
        
        try {
            // For PID commands (containing ':'), send normally
            if (command.includes(':')) {
                const success = await sendCommandNormal(command, dashboardStatusId);
                if (success) {
                    addToDashboardLog(`>>> Sent PID command: ${command}\n`);
                }
                return success;
            } 
            // For all other commands (including 'e', 'i', 'q', motor commands, etc.), use the pattern
            else {
                // Special case: if command is 'q' (stop), just send it once normally
                if (command === 'q') {
                    const success = await sendSerial('q', 'lf', dashboardStatusId);
                    if (success) {
                        addToDashboardLog(`>>> Sent stop command: ${command}\n`);
                    }
                    return success;
                }
                
                // For all other commands, use the pattern: q once, then command twice
                const success = await sendCommandWithPattern(command, dashboardStatusId);
                
                if (success) {
                    addToDashboardLog(`>>> Sent command with pattern: ${command}\n`);
                    
                    // Highlight the active button (visual feedback instead of toast)
                    document.querySelectorAll('.cmd-btn, .motor-btn').forEach(btn => {
                        btn.classList.remove('active-command');
                        if (btn.dataset.cmd === command) {
                            btn.classList.add('active-command');
                            setTimeout(() => btn.classList.remove('active-command'), 1000);
                        }
                    });
                }
                
                return success;
            }
        } catch (error) {
            console.error('Error in sendDashboardCommand:', error);
            addToDashboardLog(`[EXCEPTION] Error sending ${command}: ${error.message}\n`);
            // Keep error notifications for exceptions
            showToast('error', 'Command Error', `Failed to send ${command}: ${error.message}`, 3000);
            return false;
        }
    };
    
    // PID command functions
    const sendPIDCommand = async (type, varName, value) => {
        const command = `${type}:${varName}${value ? '=' + value : ''}`;
        await sendDashboardCommand(command);
    };

    const readAllPIDGains = async () => {
        showToast('info', 'Reading PID Gains', 'Reading all PID values from device...', 2000);
        
        const inputs = document.querySelectorAll('input[data-pid-var]');
        let readCount = 0;
        
        for (let i = 0; i < inputs.length; i++) {
            const varName = inputs[i].dataset.pidVar;
            await sendPIDCommand('R', varName, '');
            await delay(30);
            readCount++;
        }
        
        showToast('success', 'PID Read Complete', `Read ${readCount} PID values`, 2000);
    };

    const writeAllPIDGains = async () => {
        // Get selected PID gains
        const inputs = document.querySelectorAll('input[data-pid-var]');
        let selectedGains = [];
        let totalGains = 0;
        
        inputs.forEach(input => {
            const checkbox = input.nextElementSibling;
            if (checkbox && checkbox.checked) {
                const varName = input.dataset.pidVar;
                const value = input.value;
                selectedGains.push({ varName, value });
            }
            totalGains++;
        });
        
        if (selectedGains.length === 0) {
            showAlert('warning', 'No Gains Selected', 
                'No PID gains are selected for writing.',
                'Please check the boxes next to the gains you want to write.',
                `Total available gains: ${totalGains}\nSelected: 0`,
                {
                    primaryText: 'OK',
                    primaryValue: 'ok'
                }
            );
            return;
        }
        
        // Show confirmation with details
        const confirmed = await showAlert('warning', 'Write PID Gains', 
            `Are you sure you want to write ${selectedGains.length} PID gain(s)?`,
            '⚠️ CRITICAL OPERATION - This will change flight behavior! ⚠️',
            `Selected gains to write:\n${selectedGains.map(g => `• ${g.varName} = ${g.value}`).join('\n')}\n\nWARNING: Incorrect PID values can cause instability or crashes!`,
            {
                primaryText: 'Write Gains',
                secondaryText: 'Cancel',
                dangerText: 'Stop',
                primaryValue: 'write',
                secondaryValue: 'cancel',
                dangerValue: 'emergency'
            }
        );
        
        if (confirmed === 'write') {
            let writtenCount = 0;
            let failedCount = 0;
            
            // Show progress
            const progressToastId = showToast('info', 'Writing PID Gains', 
                `Writing ${selectedGains.length} gain(s)... 0/${selectedGains.length}`, 0);
            
            for (let i = 0; i < selectedGains.length; i++) {
                const { varName, value } = selectedGains[i];
                
                // Update progress
                removeToast(progressToastId);
                const newProgressToastId = showToast('info', 'Writing PID Gains', 
                    `Writing ${varName}=${value}... ${i+1}/${selectedGains.length}`, 0);
                
                try {
                    await sendPIDCommand('W', varName, value);
                    await delay(50);
                    writtenCount++;
                    
                } catch (error) {
                    failedCount++;
                    showToast('error', 'Write Failed', `Failed to write ${varName}: ${error.message}`, 3000);
                }
                
                // Update for next iteration
                progressToastId = newProgressToastId;
            }
            
            // Remove progress toast
            if (progressToastId) removeToast(progressToastId);
            
            // Show final result briefly
            if (failedCount === 0) {
                showToast('success', 'PID Write Complete', 
                    `Successfully wrote ${writtenCount} PID gain(s)`, 2000);
            } else {
                showToast('warning', 'Partial Write Complete', 
                    `Wrote ${writtenCount} of ${selectedGains.length} gain(s)`, 3000);
            }
            
        } else if (confirmed === 'emergency') {
            emergencyStopMotor();
        } else {
            showToast('info', 'Write Cancelled', 'PID gain write operation cancelled', 2000);
        }
    };
    
    // Set up button handlers
    if (dashboardConnectBtn) {
        dashboardConnectBtn.onclick = async () => {
            const port = portSelect ? portSelect.value : currentPort;
            const baud = baudSelect ? baudSelect.value : currentBaud;
            if (isConnected) {
                await disconnectSerial(dashboardStatusId);
            } else {
                if (port) {
                    await connectSerial(port, baud, dashboardStatusId);
                } else {
                    showAlert('error', 'Connection Error', 'Please select a COM port first');
                }
            }
        };
    }

    if (dashboardClearBtn) {
        dashboardClearBtn.onclick = () => { 
            if (dashboardLog) dashboardLog.textContent = ''; 
            showToast('info', 'Log Cleared', 'Dashboard log cleared', 2000);
        };
    }

    // Set up command buttons
    const cmdButtons = document.querySelectorAll('.cmd-btn');
    console.log(`Found ${cmdButtons.length} command buttons`);
    
    cmdButtons.forEach(btn => {
        btn.onclick = (e) => { 
            console.log('Command button clicked:', btn.dataset.cmd);
            sendDashboardCommand(btn.dataset.cmd); 
        };
    });

    // Set up motor buttons - keep emergency alerts for safety
    const motorButtons = document.querySelectorAll('.motor-btn');
    console.log(`Found ${motorButtons.length} motor buttons`);
    
    motorButtons.forEach(btn => {
        btn.onclick = async (e) => {
            const motorMap = {
                'm1': 'Motor 1',
                'm2': 'Motor 2',
                'm3': 'Motor 3',
                'm4': 'Motor 4'
            };
            
            const motorName = motorMap[btn.dataset.cmd] || btn.dataset.cmd;
            
            // Use custom alert for confirmation (SAFETY CRITICAL - keep this)
            const confirmed = await showAlert('warning', 'Motor Test Warning',
                `Are you sure you want to start Motor ${motorName} test?`,
                '⚠️ EXTREME DANGER - Ensure props are OFF! ⚠️',
                `This will activate ${motorName}. Make sure:
• Props are removed or securely fastened
• Drone is on a stable surface
• All safety checks are complete
• You are ready to emergency stop`,
                {
                    primaryText: 'Start Test',
                    secondaryText: 'Cancel',
                    dangerText: 'Stop',
                    primaryValue: 'start',
                    secondaryValue: 'cancel',
                    dangerValue: 'emergency'
                }
            );
            
            if (confirmed === 'start') {
                // Show safety countdown (SAFETY CRITICAL - keep this)
                const countdownToastId = showToast('warning', 'Safety Countdown',
                    'Starting motor test in 3 seconds...', 0);
                
                // Countdown sequence
                for (let i = 3; i > 0; i--) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    if (i === 3) {
                        removeToast(countdownToastId);
                        const newToastId = showToast('warning', 'Safety Countdown',
                            `Starting in ${i}...`, 0);
                        window.currentMotorToast = newToastId;
                    } else {
                        removeToast(window.currentMotorToast);
                        const newToastId = showToast('warning', 'Safety Countdown',
                            `Starting in ${i}...`, 0);
                        window.currentMotorToast = newToastId;
                    }
                }
                
                // Remove final countdown toast
                if (window.currentMotorToast) {
                    removeToast(window.currentMotorToast);
                }
                
                // Execute the motor command
                const success = await sendDashboardCommand(btn.dataset.cmd);
                
                if (success) {
                    // Show active motor warning (SAFETY CRITICAL - keep this)
                    activeMotorToast = showToast('warning', 'Motor Active',
                        `${motorName} is now active! Keep clear!`, 0);
                    
                    // Store motor state
                    activeMotorCommand = btn.dataset.cmd;
                    
                    // Create emergency stop button (SAFETY CRITICAL - keep this)
                    setTimeout(() => {
                        const emergencyToastId = showToast('error', '⚠️ MOTOR ACTIVE ⚠️',
                            `${motorName} is running. Click to emergency stop.`, 0, true);
                        
                        // Find the emergency toast and make it clickable
                        setTimeout(() => {
                            const emergencyToast = document.getElementById(emergencyToastId);
                            if (emergencyToast) {
                                emergencyToast.style.cursor = 'pointer';
                                emergencyToast.style.boxShadow = '0 0 10px #ff0000';
                                emergencyToast.onclick = () => {
                                    emergencyStopMotor();
                                    removeToast(emergencyToastId);
                                };
                            }
                        }, 100);
                    }, 500);
                    
                }
            } else if (confirmed === 'emergency') {
                // Emergency stop requested from confirmation dialog
                emergencyStopMotor();
            } else {
                // Cancelled - brief notification
                showToast('info', 'Motor Test Cancelled',
                    `${motorName} test was cancelled`, 2000);
            }
        };
    });

    // Set up stop button
    const stopBtn = document.querySelector('.stop-btn');
    if (stopBtn) {
        stopBtn.onclick = async (e) => {
            if (activeMotorCommand) {
                // If a motor is active, use emergency stop
                await emergencyStopMotor();
            } else {
                // Normal stop command - no notification
                await sendDashboardCommand('q');
            }
            document.querySelectorAll('.cmd-btn, .motor-btn').forEach(btn => {
                btn.classList.remove('active-command');
            });
        };
    }
    
    // Set up PID buttons
    const readAllPidBtn = document.getElementById('readAllPidBtn');
    const writeAllPidBtn = document.getElementById('writeAllPidBtn');
    
    if (readAllPidBtn) {
        readAllPidBtn.onclick = readAllPIDGains;
    }
    
    if (writeAllPidBtn) {
        writeAllPidBtn.onclick = writeAllPIDGains;
    }
    
    // Initialize sliders
    ['roll', 'pitch', 'throttle', 'yaw', 'ch5', 'ch6'].forEach(id => updateSlider(id, 1000));
    
    // Initialize log
    if (dashboardLog) {
        dashboardLog.textContent = 'Dashboard ready. Connect to start receiving data.\n';
    }
    
    // Add data callback
    addDataCallback(processDashboardData);
    
    // Add raw data logging callback for debugging
    addDataCallback((data) => {
        console.log('Raw dashboard data:', data.substring(0, 100));
    });

    // Update connection status
    if (isConnected) {
        updateConnectionStatus(dashboardStatusId, `Connected to ${currentPort}`);
    } else {
        updateConnectionStatus(dashboardStatusId, 'Disconnected - Click Connect');
    }
    
    console.log('Dashboard initialization complete');
}

// ==================== 3D SIMULATION FUNCTIONS ====================

window.onWindowResize = () => {
    const modelContainer = document.getElementById('model-container');
    if (camera && renderer && modelContainer) {
        camera.aspect = modelContainer.clientWidth / modelContainer.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(modelContainer.clientWidth, modelContainer.clientHeight);
    }
};

function animate() {
    requestAnimationFrame(animate);
    if (controls) controls.update();
    updateDroneRotation();
    if (renderer && scene && camera) renderer.render(scene, camera);
}

function loadDroneModel() {
    const loader = new THREE.OBJLoader();
    const modelPath = '/models/drone_costum.obj'; 
    
    loader.load(
        modelPath,
        (object) => {
            droneModel = object;
            
            const box = new THREE.Box3().setFromObject(droneModel);
            const size = box.getSize(new THREE.Vector3());
            
            box.getCenter(droneModel.position).multiplyScalar(-1); 
            
            const maxDim = Math.max(size.x, size.y,size.z);
            const scale = 2 / maxDim;
            droneModel.scale.setScalar(scale);
            
            droneModel.position.y += 0.5 + ((size.y * scale) / 2);
            
            droneModel.quaternion.identity();
            
            droneModel.traverse((child) => {
                if (child.isMesh) {
                    if (!child.material || child.material.length === 0) {
                        child.material = new THREE.MeshLambertMaterial({ color: 0x00ff00, wireframe: false });
                    }
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(droneModel);
            console.log('Drone model loaded');
        },
        (xhr) => { 
            console.log((xhr.loaded / xhr.total * 100) + '% loaded'); 
        },
        (error) => {
            console.error('Error loading OBJ model:', error);
            createFallbackDroneModel();
        }
    );
}

function createFallbackDroneModel() {
    console.log('Creating fallback drone model');
    const droneGroup = new THREE.Group();
    const bodyGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 8);
    const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0x333333 });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    droneGroup.add(body);
    
    const armGeometry = new THREE.BoxGeometry(1.5, 0.05, 0.05);
    const armMaterial = new THREE.MeshLambertMaterial({ color: 0x666666 });
    
    const arm1 = new THREE.Mesh(armGeometry, armMaterial); arm1.position.x = 0.75; droneGroup.add(arm1);
    const arm2 = new THREE.Mesh(armGeometry, armMaterial); arm2.position.x = -0.75; droneGroup.add(arm2);
    const arm3 = new THREE.Mesh(armGeometry, armMaterial); arm3.rotation.z = Math.PI / 2; arm3.position.y = 0.75; droneGroup.add(arm3);
    const arm4 = new THREE.Mesh(armGeometry, armMaterial); arm4.rotation.z = Math.PI / 2; arm4.position.y = -0.75; droneGroup.add(arm4);
    
    const motorGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 8);
    const motorMaterial = new THREE.MeshLambertMaterial({ color: 0x888888 });
    
    const positions = [[0.75, 0, 0], [-0.75, 0, 0], [0, 0.75, 0], [0, -0.75, 0]];
    positions.forEach(pos => {
        const motor = new THREE.Mesh(motorGeometry, motorMaterial);
        motor.position.set(pos[0], pos[1], 0);
        droneGroup.add(motor);
        
        const propGeometry = new THREE.BoxGeometry(0.4, 0.02, 0.1);
        const propMaterial = new THREE.MeshLambertMaterial({ color: 0xCCCCCC });
        const propeller = new THREE.Mesh(propGeometry, propMaterial);
        motor.add(propeller);
    });
    
    const frontIndicator = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshLambertMaterial({ color: 0xFF0000 }));
    frontIndicator.position.set(0, 0.9, 0); droneGroup.add(frontIndicator);
    
    const backIndicator = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshLambertMaterial({ color: 0x0000FF }));
    backIndicator.position.set(0, -0.9, 0); droneGroup.add(backIndicator);
    
    droneGroup.position.y = 0.05;
    droneGroup.quaternion.identity();
    
    droneModel = droneGroup;
    scene.add(droneModel);
}

// --- 3D SIMULATOR INITIALIZATION ---
function initializeSimulator() {
    console.log('Initializing 3D simulator...');
    
    const simConnectBtn = document.getElementById('simConnectBtn');
    const simStartBtn = document.getElementById('simStartBtn');
    const simStatusId = 'simStatus';
    const resetViewBtn = document.getElementById('resetView');
    const resetOrientationBtn = document.getElementById('resetOrientation');
    const toggleAxesBtn = document.getElementById('toggleAxes');
    const toggleRotationBtn = document.getElementById('toggleRotation');
    const smoothingSlider = document.getElementById('smoothingSlider');
    const smoothingValue = document.getElementById('smoothingValue');
    const portSelect = document.getElementById('port');
    const baudSelect = document.getElementById('baud');
    
    const init3DScene = () => {
        const modelContainer = document.getElementById('model-container');
        if (!modelContainer) {
            console.error('Model container not found');
            return;
        }
        
        if (modelContainer.querySelector('canvas')) {
            window.onWindowResize();
            return;
        }
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x11111b);
        camera = new THREE.PerspectiveCamera(75, modelContainer.clientWidth / modelContainer.clientHeight, 0.1, 1000);
        camera.position.set(5, 3, 5);
        camera.lookAt(0, 0, 0);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(modelContainer.clientWidth, modelContainer.clientHeight);
        renderer.shadowMap.enabled = true;
        modelContainer.appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0x404040, 2));
        const dl = new THREE.DirectionalLight(0xffffff, 1); 
        dl.position.set(10, 10, 5); 
        dl.castShadow = true; 
        scene.add(dl);
        
        scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
        axesHelper = new THREE.AxesHelper(2); 
        scene.add(axesHelper);
        
        loadDroneModel();
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;
        
        animate();
        console.log('3D scene initialized');
    };

    const processSimulatorData = (data) => {
        console.log('Simulator data:', data.substring(0, 100));
        
        const lines = data.split('\n');
        lines.forEach(line => {
            line = line.trim(); 
            if (!line) return;
            
            if (line.includes('Pitch:') && line.includes('Roll:') && line.includes('Yaw:')) {
                const pitchMatch = line.match(/Pitch:\s*([-\d.]+)/);
                const rollMatch = line.match(/Roll:\s*([-\d.]+)/);
                const yawMatch = line.match(/Yaw:\s*([-\d.]+)/);
                
                if (pitchMatch && rollMatch && yawMatch) {
                    let pitch = parseFloat(pitchMatch[1]);
                    let roll = parseFloat(rollMatch[1]);
                    let yaw = parseFloat(yawMatch[1]);
                    
                    if (Math.abs(pitch) > 400 || Math.abs(roll) > 400 || Math.abs(yaw) > 400) { 
                        pitch = 0; 
                        roll = 0; 
                        yaw = 0; 
                    }
                    setTargetRotation(yaw, pitch, roll);
                    
                    updateElement('sim-pitch', pitch.toFixed(2) + '°');
                    updateElement('sim-roll', roll.toFixed(2) + '°');
                    updateElement('sim-yaw', yaw.toFixed(2) + '°');
                }
            }
            else if (line.includes('Gyro_x =')) {
                const x = line.match(/Gyro_x\s*=\s*([-\d]+)/); 
                if (x) updateElement('sim-gyroX', x[1]);
            }
            else if (line.includes('ACC_x =')) {
                const x = line.match(/ACC_x\s*=\s*([-\d]+)/); 
                if (x) updateElement('sim-accelX', x[1]);
            }
        });
    };
    
    // Create sensor displays
    const createSensorDisplays = () => {
        const container = document.getElementById('sensor-values');
        if (container) {
            container.innerHTML = '';
            [{ key: 'yaw', label: 'Yaw', unit: '°' }, 
             { key: 'pitch', label: 'Pitch', unit: '°' }, 
             { key: 'roll', label: 'Roll', unit: '°' }].forEach(s => {
                container.innerHTML += `<div class="sensor-card"><span class="sensor-label">${s.label}</span><span class="sensor-value" id="sim-${s.key}">- ${s.unit}</span></div>`;
            });
        }
    };
    
    createSensorDisplays();
    init3DScene();
    resetRotation();

    // Set up button handlers
    if (simConnectBtn) {
        simConnectBtn.onclick = async () => {
            const port = portSelect ? portSelect.value : currentPort;
            const baud = baudSelect ? baudSelect.value : currentBaud;
            if (isConnected) {
                await disconnectSerial(simStatusId);
            } else {
                if (port) {
                    await connectSerial(port, baud, simStatusId);
                } else {
                    showAlert('error', 'Connection Error', 'Please select a COM port first');
                }
            }
        };
    }

    if (simStartBtn) {
        simStartBtn.onclick = async () => {
            console.log('Starting IMU streaming...');
            
            if (!isConnected) {
                showAlert('error', 'Not Connected', 'Please connect to serial port first');
                return;
            }
            
            // Use the command pattern for IMU command 'e'
            await sendCommandWithPattern('e', simStatusId);
            
            const statusEl = document.getElementById(simStatusId);
            if (statusEl) {
                showStatus(statusEl, 'IMU streaming started (e command sent)', 'success');
            }
        };
    }

    if (resetViewBtn) resetViewBtn.onclick = () => { 
        if (controls) controls.reset(); 
        showToast('info', 'View Reset', 'Camera view has been reset to default', 2000);
    };
    
    if (resetOrientationBtn) resetOrientationBtn.onclick = () => { 
        resetRotation(); 
        showToast('info', 'Orientation Reset', 'Drone orientation has been reset', 2000);
    };
    
    if (toggleAxesBtn) toggleAxesBtn.onclick = () => { 
        if (axesHelper) axesHelper.visible = isAxesVisible = !isAxesVisible; 
        showToast('info', isAxesVisible ? 'Axes Shown' : 'Axes Hidden', 
            isAxesVisible ? 'Coordinate axes are now visible' : 'Coordinate axes are now hidden', 2000);
    };
    
    if (toggleRotationBtn) toggleRotationBtn.onclick = () => { 
        useQuaternions = !useQuaternions; 
        if (toggleRotationBtn) {
            toggleRotationBtn.textContent = useQuaternions ? 'Quaternion Mode' : 'Euler Mode'; 
        }
        showToast('info', 'Rotation Mode Changed', 
            useQuaternions ? 'Now using Quaternion rotation (smoother)' : 'Now using Euler rotation (direct)', 2000);
    };
    
    if (smoothingSlider && smoothingValue) {
        smoothingSlider.oninput = () => { 
            rotationSmoothingFactor = parseFloat(smoothingSlider.value);
            smoothingValue.textContent = rotationSmoothingFactor.toFixed(2); 
            showToast('info', 'Smoothing Adjusted', `Rotation smoothing set to ${rotationSmoothingFactor.toFixed(2)}`, 1500);
        };
    }
    
    // Add data callback for simulator
    addDataCallback(processSimulatorData);
    
    // Add raw data logging callback for debugging
    addDataCallback((data) => {
        console.log('Raw simulator data:', data.substring(0, 100));
    });

    // Update connection status
    if (isConnected) {
        updateConnectionStatus(simStatusId, `Connected to ${currentPort}`);
    } else {
        updateConnectionStatus(simStatusId, 'Disconnected - Connect to see real-time simulation');
    }
    
    console.log('3D simulator initialization complete');
}

// Monitor serial data for errors (but not success messages)
function monitorSerialForErrors(data) {
    if (data.includes('ERROR') || data.includes('FAIL') || data.includes('INVALID')) {
        showToast('error', 'Device Error', 'Error detected in device output', 4000);
    }
    
    if (data.includes('WARN') || data.includes('CAUTION')) {
        showToast('warning', 'Device Warning', 'Warning from device', 3000);
    }
}

// Add to your data callbacks
addDataCallback(monitorSerialForErrors);


// GPS lock notification
let lastGpsStatus = false;
function checkGpsStatus(gpsData) {
    if (gpsData && gpsData.valid !== lastGpsStatus) {
        if (gpsData.valid) {
            showToast('success', 'GPS Lock', 
                `GPS lock acquired with ${gpsData.satellites || 0} satellites`, 3000);
        } else {
            showToast('warning', 'GPS Lost', 'GPS signal lost', 3000);
        }
        lastGpsStatus = gpsData.valid;
    }
}
